<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湘阁里辣 · 包间预订</title>
<style>
:root {
  --bg: #FDF8F0; --card-bg: #FFFFFF; --primary: #B22222;
  --gold: #C9A96E; --gold-light: #F5ECD7; --text: #2C2C2C;
  --text-light: #6B6B6B; --green: #2E7D32; --green-bg: #E8F5E9;
  --red: #C62828; --red-bg: #FFEBEE; --blue: #1565C0; --blue-bg: #E3F2FD;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* ── 登录页 ── */
.login-overlay {
  position: fixed; inset:0; background: linear-gradient(135deg, #5C0A0A 0%, #7A1212 50%, #4A0606 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999; transition: opacity .4s;
}
.login-overlay.hidden { opacity:0; pointer-events:none; }
.login-logo { height:60px; margin-bottom:16px; display:block; margin-left:auto; margin-right:auto; }
.login-box {
  background:#fff; border-radius:16px; padding:36px 32px; width:380px; max-width:90vw;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.logo-icon { font-size:48px; margin-bottom:8px; }
.login-box h2 { font-size:22px; margin-bottom:4px; color:var(--primary); }
.login-box .sub { font-size:13px; color:var(--text-light); margin-bottom:20px; }
.login-box input {
  width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:8px;
  font-size:15px; margin-bottom:12px; outline:none; font-family:inherit;
}
.login-box input:focus { border-color:var(--primary); }
.login-box .btn-login {
  width:100%; padding:11px; background: linear-gradient(135deg, var(--primary), #D4443F);
  color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600;
  cursor:pointer; margin-top:4px;
}
.login-box .btn-login:hover { opacity:.9; transform:translateY(-1px); }
.login-box .login-hint { font-size:12px; color:var(--text-light); margin-top:12px; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #5C0A0A 0%, #9B1B1B 30%, #7A1212 70%, #5C0A0A 100%);
  color:#fff; padding:14px 20px; display:flex; align-items:center;
  justify-content:space-between; flex-wrap:wrap; gap:12px;
  box-shadow:0 4px 24px rgba(100,8,8,0.35); position:sticky; top:0; z-index:100;
  border-bottom:2px solid rgba(201,169,110,0.55);
}
.header-brand { display:flex; align-items:center; gap:12px; }
.header-logo-icon { font-size:32px; filter:drop-shadow(0 1px 2px rgba(255,255,255,0.15)); }
.header-title { display:flex; flex-direction:column; }
.header-store { font-size:17px; font-weight:700; letter-spacing:2px; line-height:1.3; text-shadow:0 1px 3px rgba(0,0,0,0.3); }
.header-subtitle { font-size:12px; font-weight:400; opacity:.7; letter-spacing:3px; color:var(--gold); }
.header-right { display:flex; align-items:center; gap:10px; }
.header-logo { height:38px; }
.date-picker {
  padding:8px 14px; border:2px solid rgba(255,255,255,0.3); border-radius:8px;
  background:rgba(255,255,255,0.15); color:#fff; font-size:15px; font-weight:600;
  cursor:pointer; outline:none;
}
.date-picker::-webkit-calendar-picker-indicator { filter:invert(1); cursor:pointer; }
.status-badge { display:flex; align-items:center; gap:4px; font-size:13px; background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:20px; }
.status-badge .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot.live { background:#4CAF50; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.admin-btn {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
  color:#fff; padding:6px 12px; border-radius:8px; cursor:pointer;
  font-size:13px; font-family:inherit; transition:all .2s;
}
.admin-btn:hover { background:rgba(255,255,255,0.25); }
.logout-btn {
  background:transparent; border:1px solid rgba(255,255,255,0.4);
  color:#fff; padding:5px 10px; border-radius:6px; cursor:pointer;
  font-size:12px; font-family:inherit; opacity:.7;
}
.logout-btn:hover { opacity:1; }

/* ── Main ── */
.main { max-width:1200px; margin:0 auto; padding:24px 16px; }
.section-title {
  font-size:18px; font-weight:700; color:var(--text); margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.section-title::before { content:''; width:4px; height:20px; background:var(--primary); border-radius:2px; }

/* ── 桌台网格 ── */
.room-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:32px;
}
@media(max-width:960px) { .room-grid { grid-template-columns:repeat(3,1fr); gap:10px; } }
@media(max-width:680px) { .room-grid { grid-template-columns:repeat(3,1fr); gap:8px; } }
@media(max-width:420px) { .room-grid { grid-template-columns:repeat(2,1fr); gap:6px; } }

/* ── 桌台卡片 ── */
.room-card {
  background:var(--card-bg); border-radius:var(--radius); padding:16px 14px 14px;
  text-align:center; box-shadow:var(--shadow); position:relative;
  overflow:hidden; transition:all .25s; cursor:pointer;
  border:2px solid transparent;
}
.room-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.room-card:not(.booked):hover { border-color:var(--green); }
/* 彩色顶部条 */
.room-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.room-card.cat-named::before { background:linear-gradient(90deg,var(--primary),#E87A7A); }
.room-card.cat-b::before { background:linear-gradient(90deg,var(--blue),#64B5F6); }
.room-card.cat-a::before { background:linear-gradient(90deg,var(--green),#81C784); }
/* 已预订背景 */
.room-card.booked.cat-named { background:linear-gradient(135deg,#FFF0F0,#FFE0E0); border-color:#E8B4B4; }
.room-card.booked.cat-b { background:linear-gradient(135deg,#E3F0FF,#D0E3FF); border-color:#A8C8F0; }
.room-card.booked.cat-a { background:linear-gradient(135deg,#E6F5E6,#D0ECD0); border-color:#A8D0A8; }
.room-card.booked:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.14); }
.room-card .edit-hint { position:absolute; top:12px; right:12px; font-size:11px; color:var(--text-light); opacity:0; transition:opacity .2s; }
.room-card:hover .edit-hint { opacity:0.7; }

/* ── 多时段预订卡片 ── */
.room-card.multi-booking { cursor:default; padding-bottom:10px; }
.room-card.multi-warn {
  background:linear-gradient(135deg,#FFF0F0,#FFD0D0) !important;
  border-color:#DA251D !important;
  box-shadow:0 0 0 2px rgba(218,37,29,0.3);
}
.room-card.multi-warn .room-name { color:#DA251D; }
.booking-slots-wrap { display:flex; flex-direction:column; gap:6px; margin:6px 0 0; }
.booking-slot {
  border-radius:8px; padding:8px 10px; cursor:pointer; text-align:left;
  transition:all .15s; position:relative; font-size:13px;
  background:#E3F0FF; border-left:3px solid #4A9EFF;
}
.booking-slot:hover { transform:translateX(2px); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.slot-header { display:flex; align-items:center; gap:6px; margin-bottom:2px; }
.slot-time { font-weight:700; font-size:14px; color:var(--text); }
.slot-period { font-size:11px; padding:1px 6px; border-radius:4px; font-weight:600; }
.slot-body { color:var(--text-light); line-height:1.6; font-size:12px; }
.slot-body strong { color:var(--text); }
.btn-small-cancel {
  position:absolute; top:4px; right:4px; padding:2px 8px; font-size:10px;
  border:none; border-radius:4px; background:rgba(0,0,0,0.06); color:#999;
  cursor:pointer; font-family:inherit;
}
.btn-small-cancel:hover { background:rgba(183,28,28,0.15); color:#B71C1C; }

/* ── 状态标签 ── */
.room-status.warn { color:#DA251D; background:rgba(218,37,29,0.12); }
.room-status.warn .status-dot { background:#DA251D; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.room-name { font-size:17px; font-weight:700; margin-top:6px; margin-bottom:6px; }
.room-category { font-size:11px; color:var(--text-light); margin-bottom:6px; }
.room-status {
  display:inline-flex; align-items:center; gap:6px; font-size:13px;
  font-weight:700; padding:4px 12px; border-radius:20px; margin-bottom:8px;
}
.room-status.free { color:var(--green); background:var(--green-bg); }
.room-status.booked { color:#B71C1C; background:rgba(183,28,28,0.1); }
.room-status .status-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.room-booking-info {
  font-size:13px; color:var(--text-light); background:rgba(255,255,255,0.6);
  padding:8px 10px; border-radius:8px; margin-bottom:8px; line-height:1.8;
}
.room-booking-info strong { color:var(--text); }
.room-time-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-right:4px; }
.room-time-tag.morning { background:#FFF3E0; color:#E65100; }
.room-time-tag.afternoon { background:#F3E5F5; color:#6A1B9A; }
.room-action {
  display:inline-block; margin-top:6px; padding:7px 16px; border:none;
  border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
  font-family:inherit; transition:all .2s; width:100%; text-align:center;
}
.room-action.free-action { background:var(--gold-light); color:var(--primary); }
.room-action.free-action:hover { background:var(--gold); color:#fff; }
.room-action.booked-action { background:rgba(0,0,0,0.06); color:var(--text); }
.room-action.booked-action:hover { background:rgba(0,0,0,0.12); }

/* ── 卡片双按钮行 ── */
.room-actions-row { display:flex; gap:6px; margin-top:6px; }
.room-actions-row button { flex:1; padding:5px 0; font-size:12px; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; }
.room-actions-row .btn-cancel { background:rgba(0,0,0,0.06); color:var(--text); }
.room-actions-row .btn-cancel:hover { background:rgba(0,0,0,0.12); }
.room-actions-row .btn-add { background:var(--gold-light); color:var(--primary); border:1px solid var(--gold); }
.room-actions-row .btn-add:hover { background:var(--gold); color:#fff; }

/* ── 预订记录 ── */
.tab-bar { display:flex; gap:6px; }
.tab-btn {
  padding:8px 18px; border:1px solid #ddd; border-radius:8px; background:#fff;
  cursor:pointer; font-size:13px; font-family:inherit; font-weight:600; transition:.2s;
}
.tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tab-btn:hover:not(.active) { border-color:var(--primary); color:var(--primary); }
.booking-table { width:100%; border-collapse:collapse; margin-top:16px; background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.booking-table th { background:var(--primary); color:#fff; padding:10px 12px; font-size:13px; text-align:left; }
.booking-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid #f0f0f0; }
.booking-table tr.row-past td { color:#bbb; }
.booking-table tr:hover { background:#fdf6f0; }
.action-link { color:var(--red); cursor:pointer; font-size:12px; font-weight:600; text-decoration:none; }
.action-link:hover { text-decoration:underline; }
.no-data { text-align:center; padding:40px; color:var(--text-light); font-size:14px; }

/* ── 弹窗 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal {
  background:#fff; border-radius:16px; padding:28px 30px; width:480px; max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:slideUp .25s ease;
  max-height:90vh; overflow-y:auto;
}
@media(max-width:680px) {
  .modal { width:100%; max-width:100%; height:100%; max-height:100vh; border-radius:0; padding:20px 16px; }
  .modal h2 { font-size:18px; }
  .form-group input,.form-group select { padding:8px 12px; font-size:14px; }
  .btn { padding:10px; font-size:14px; }
}
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h2 { font-size:20px; margin-bottom:16px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
.form-group label .req { color:var(--primary); margin-left:2px; }
.form-group input,.form-group select {
  width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:8px;
  font-size:15px; font-family:inherit; outline:none; transition:.2s; background:#fafafa;
}
.form-group input:focus,.form-group select:focus { border-color:var(--primary); background:#fff; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }
.modal-actions { display:flex; gap:10px; margin-top:24px; }
.btn {
  flex:1; padding:12px; border-radius:8px; font-size:15px;
  font-weight:600; cursor:pointer; border:none; transition:.2s;
}
.btn-primary { background:linear-gradient(135deg,var(--primary),#D4443F); color:#fff; box-shadow:0 4px 12px rgba(178,34,34,0.3); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(178,34,34,0.4); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { opacity:.9; }
.btn-secondary { background:#f5f5f5; color:var(--text); }
.btn-secondary:hover { background:#e8e8e8; }

/* ── 桌台选择（合并） ── */
.table-check-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0;
}
.table-check-item {
  padding:10px 8px; border:2px solid #e8e8e8; border-radius:8px;
  cursor:pointer; text-align:center; font-size:13px; font-weight:600;
  transition:.15s; user-select:none;
}
.table-check-item:hover { border-color:var(--gold); }
.table-check-item.selected { border-color:var(--primary); background:#FFF0F0; color:var(--primary); }
.table-check-item.disabled { opacity:.35; cursor:not-allowed; background:#f5f5f5; border-color:#eee; }
.table-check-item .cat { font-size:10px; color:var(--text-light); display:block; }
#tableCount { font-size:13px; color:var(--primary); font-weight:600; margin-top:6px; }

/* ── 管理面板 ── */
.admin-panel { display:none; }
.admin-panel.show { display:block; }
.admin-nav { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.admin-nav-item {
  padding:8px 16px; border:1px solid #ddd; border-radius:8px; cursor:pointer;
  font-size:13px; font-weight:600; font-family:inherit; background:#fff; transition:.2s;
}
.admin-nav-item.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.admin-section { display:none; }
.admin-section.active { display:block; }
.table-manage-list {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px;
}
.table-manage-item {
  background:#fff; padding:12px; border-radius:10px; box-shadow:var(--shadow);
  display:flex; justify-content:space-between; align-items:center; font-size:14px;
}
.table-manage-item .cat { font-size:11px; color:var(--text-light); }
.delete-table-btn { background:#fee; color:var(--red); border:none; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px; }
.add-table-form { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:12px; }
.add-table-form input { padding:8px 12px; border:2px solid #e8e8e8; border-radius:8px; font-size:14px; font-family:inherit; outline:none; }
.add-table-form input:focus { border-color:var(--primary); }
.add-table-form .add-btn { padding:8px 16px; background:var(--primary); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-family:inherit; }
.batch-textarea { width:100%; min-height:100px; padding:10px; border:2px solid #e8e8e8; border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
.batch-help { font-size:12px; color:var(--text-light); margin:6px 0; }
.export-btn { padding:8px 16px; background:var(--blue); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; margin-bottom:12px; font-family:inherit; }

/* ── Toast ── */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:999;
  background:#333; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px;
  opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }
.toast.error { background:var(--red); }

/* ── 手机端优化 ── */
@media (max-width: 680px) {
  .header { padding:10px 14px; border-bottom-width:1px; }
  .header-logo-icon { font-size:28px; }
  .header-store { font-size:14px; letter-spacing:1px; }
  .header-subtitle { font-size:10px; letter-spacing:2px; }
  .header-brand { gap:8px; }
  .date-picker { padding:6px 10px; font-size:13px; }
  .status-badge { font-size:11px; padding:4px 10px; }
  #liveClock { font-size:11px; }
  .admin-btn { font-size:11px; padding:5px 8px; }
  .main { padding:16px 10px; }
  .section-title { font-size:15px; margin-bottom:12px; }
  .room-card { padding:10px 8px; border-radius:10px; }
  .room-card::before { height:3px; }
  .room-name { font-size:13px; margin-top:4px; margin-bottom:4px; }
  .room-category { font-size:10px; margin-bottom:4px; }
  .room-status { font-size:11px; padding:2px 8px; margin-bottom:6px; }
  .room-time-tag { font-size:10px; padding:1px 6px; }
  .room-booking-info { font-size:11px; padding:4px 6px; line-height:1.5; }
  .room-action { padding:5px 10px; font-size:11px; margin-top:6px; }
  .room-card .edit-hint { display:none; }
  .tab-btn { padding:8px 16px; font-size:13px; }
  .table-check-grid { grid-template-columns:repeat(3,1fr); }
}
@media (max-width: 420px) {
  .room-card { padding:8px 6px; }
  .room-name { font-size:12px; }
  .table-check-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ── 登录页 ── -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <img src="logo.png" class="login-logo" alt="湘阁里辣">
    <h2>包间预订系统</h2>
    <div class="sub">请输入账号密码登录</div>
    <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">登 录</button>

  </div>
</div>

<!-- ── Header ── -->
<div class="header">
  <div class="header-brand">
    <img src="logo.png" class="header-logo" alt="湘阁里辣">
    <div class="header-title">
      <div class="header-store" id="storeNameDisplay">湘阁里辣</div>
      <div class="header-subtitle">包 间 预 订</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge" id="connectionBadge">
      <span class="dot live"></span><span id="connText">实时</span>
    </div>
    <span id="liveClock" style="font-size:13px;opacity:.8;color:#fff;min-width:50px;text-align:center"></span>
    <input type="date" class="date-picker" id="datePicker">
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()" style="display:none">⚙️</button>
    <button class="logout-btn" onclick="doLogout()">退出</button>
  </div>
</div>

<!-- ── 管理面板 ── -->
<div class="admin-panel" id="adminPanel" style="max-width:1200px;margin:0 auto;padding:20px 16px;">
  <div class="section-title">🔧 管理后台</div>
  <div class="admin-nav">
    <button class="admin-nav-item active" onclick="showAdminSection('tables')">桌台管理</button>
    <button class="admin-nav-item" onclick="showAdminSection('batch')">批量导入</button>
    <button class="admin-nav-item" onclick="showAdminSection('accounts')">账号管理</button>
    <button class="admin-nav-item" onclick="showAdminSection('store')">门店设置</button>
    <button class="admin-nav-item" onclick="showAdminSection('export')">历史导出</button>
  </div>

  <div class="admin-section active" id="sec-tables">
    <div class="add-table-form">
      <input type="text" id="newTableName" placeholder="桌台名称（如：VIP01）" style="width:160px">
      <select id="newTableCat"><option value="包间">包间</option><option value="大厅">大厅</option><option value="卡座">卡座</option></select>

      <button class="add-btn" onclick="saveStoreWebhook()" style="margin-top:6px">💾 保存企微地址</button>

      <button class="add-btn" onclick="saveStoreNav()" style="margin-top:6px">💾 保存导航</button>

    <div style="margin-top:10px">

      <button class="add-btn" onclick="saveStoreParking()" style="margin-top:6px">💾 保存停车说明</button>

        <p class="batch-help">每行一个，格式：桌台名,分类</p>
        <textarea class="batch-textarea" id="batchInput2" placeholder="B17,大厅&#10;B18,大厅" style="height:80px"></textarea>
        <button class="add-btn" onclick="batchImportForStore()" style="margin-top:8px">📥 批量导入</button>

<!-- ── Main ── -->
<div class="main">
  <div class="section-title">桌台状态</div>
  <div class="room-grid" id="roomGrid"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div class="section-title" style="margin-bottom:0">预订记录</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('today')" id="tabToday">今日预订</button>
      <button class="tab-btn" onclick="switchTab('all')" id="tabAll">全部预订</button>

  <table class="booking-table" id="bookingTable" style="display:block">
    <thead><tr id="bookingTableHead"><th>桌台</th><th>时间</th><th>姓名</th><th>手机</th><th>人数</th><th>操作</th></tr></thead>
    <tbody id="bookingTbody"></tbody>
  </table>
  <div class="no-data" id="noData">暂无预订记录</div>
</div>

<!-- ── 预订弹窗 ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">📝 预订登记</h2>
    <div class="form-group">
      <label>选择桌台<span class="req">*</span></label>
      <div class="table-check-grid" id="tableCheckGrid"></div>
      <div id="tableCount">已选：0 张桌台</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>日期<span class="req">*</span></label>
        <input type="date" id="formDate">
      </div>
      <div class="form-group">
        <label>时间<span class="req">*</span></label>
        <input type="time" id="formTime">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>姓名<span class="req">*</span></label>
        <input type="text" id="formName" placeholder="顾客姓名">
      </div>
      <div class="form-group">
        <label>人数<span class="req">*</span></label>
        <input type="number" id="formPeople" placeholder="预订人数" min="1">
      </div>
    </div>
    <div class="form-group">
      <label>手机号</label>
      <input type="tel" id="formPhone" placeholder="选填">
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="formNote" placeholder="选填" rows="2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()">确认预订</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 全局状态 ──
let state = {
  token: '', user: null, store: 'dalang', storeName: '',
  tables: [], bookings: [], date: '', history: [],
  currentTab: 'today', isAdmin: false, adminVisible: false,
  editId: null, selectedTables: [], currentStore: ''
};

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', () => {
  const _nd = new Date();
  state.date = `${_nd.getFullYear()}-${String(_nd.getMonth()+1).padStart(2,'0')}-${String(_nd.getDate()).padStart(2,'0')}`;
  const dp = document.getElementById('datePicker');
  dp.value = state.date;
  dp.addEventListener('change', () => { state.date = dp.value; loadAll(); });
  
  // 尝试恢复登录
  const saved = localStorage.getItem('auth');
  if (saved) {
    try {
      const auth = JSON.parse(saved);
      state.token = auth.token; state.user = auth.username;
      state.store = auth.store; state.storeName = auth.storeName; state.isAdmin = auth.role === 'admin';
      hideLogin();
      initApp();
    } catch { showLogin(); }
  }
});

// ── 登录 ──
function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }
function hideLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!username || !password) { toast('请输入用户名和密码', 'error'); return; }
  
  try {
    const r = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error || '登录失败', 'error'); return; }
    
    state.token = d.token; state.user = d.username;
    state.store = d.store; state.storeName = d.storeName; state.isAdmin = d.role === 'admin';
    localStorage.setItem('auth', JSON.stringify(d));
    hideLogin();
    initApp();
    toast(`欢迎，${d.storeName}`);
  } catch(e) { toast('登录失败: ' + e.message, 'error'); }
}

function doLogout() {
  localStorage.removeItem('auth');
  state.token = ''; state.user = null; state.store = 'dalang'; state.storeName = '';
  state.isAdmin = false; state.adminVisible = false;
  document.getElementById('adminPanel').classList.remove('show');
  document.getElementById('adminBtn').style.display = 'none';
  showLogin();
}

// ── 初始化应用 ──
async function initApp() {
  document.getElementById('storeNameDisplay').textContent = state.storeName || '湘阁里辣';
  document.getElementById('adminBtn').style.display = state.isAdmin ? 'inline-block' : 'none';
  
  // 检查 token 是否有效
  try {
    const r = await fetch('/api/me', {headers:{'Authorization':'Bearer '+state.token}});
    if (!r.ok) {
      const errText = await r.text();
      console.error('auth check failed:', r.status, errText);
      throw new Error(r.status + ' ' + errText);
    }
    const d = await r.json();
    state.store = d.store; state.storeName = d.storeName;
    state.isAdmin = d.role === 'admin';
    state.tables = d.tables || [];
    document.getElementById('storeNameDisplay').textContent = state.storeName;
    document.getElementById('adminBtn').style.display = state.isAdmin ? 'inline-block' : 'none';
  } catch(e) { console.error('initApp error:', e); toast('登录验证失败: ' + e.message, 'error'); doLogout(); return; }
  
  loadAll();
  connectSSE();
}

// ── 加载数据 ──
async function loadAll() {
  if (state.isAdmin) {
    try {
      const r = await fetch(`/api/admin/unified?date=${state.date}`, {
        headers:{'Authorization':'Bearer '+state.token}
      });
      if (!r.ok) throw new Error('auth');
      state.allStoresData = await r.json();
      // 合并所有门店的预订（标记门店）
      state.bookings = [];
      state.tables = [];
      for (const s of state.allStoresData) {
        for (const b of (s.bookings || [])) {
          state.bookings.push({...b, _storeId: s.id, _storeName: s.name});
        }
        for (const t of (s.tables || [])) {
          state.tables.push({...t, _storeId: s.id, _storeName: s.name});
        }
      }
    } catch { state.bookings = []; state.allStoresData = []; }
  } else {
    try {
      const r = await fetch(`/api/store/${state.store}/bookings?date=${state.date}`, {
        headers:{'Authorization':'Bearer '+state.token}
      });
      if (!r.ok) throw new Error('auth');
      state.bookings = await r.json();
    } catch { state.bookings = []; }
  }
  
  renderGrid();
  renderBookingTable();
  // 管理员显示门店列
  updateBookingTableHead();
}

function updateBookingTableHead() {
  const head = document.getElementById('bookingTableHead');
  if (!head) return;
  const before = head.querySelector('.store-th');
  if (state.isAdmin && !before) {
    const th = document.createElement('th');
    th.className = 'store-th';
    th.textContent = '门店';
    head.insertBefore(th, head.firstChild);
  } else if (!state.isAdmin && before) {
    before.remove();
  }
}

// ── SSE 实时连接 ──
function connectSSE() {
  const evt = new EventSource('/api/events');
  evt.addEventListener('updated', e => {
    try {
      const d = JSON.parse(e.data);
      if (state.isAdmin || !d.store || d.store === state.store) {
        loadAll();
        // 配置变更也刷新
      }
    } catch {}
  });
  evt.addEventListener('config_update', e => {
    try {
      const d = JSON.parse(e.data);
      if (state.isAdmin) { loadAll(); } else if (d.store === state.store) { state.tables = d.tables; renderGrid(); }
    } catch {}
  });
  evt.addEventListener('reset', e => { loadAll(); toast('已自动清空，历史记录已保留'); });
  evt.addEventListener('connected', () => {
    document.getElementById('connText').textContent = '实时';
    document.getElementById('connectionBadge').querySelector('.dot').style.background = '#4CAF50';
  });
  evt.addEventListener('error', () => {
    document.getElementById('connText').textContent = '重连';
    document.getElementById('connectionBadge').querySelector('.dot').style.background = '#FF9800';
  });
}

// ── 渲染桌台网格 ──
function getCatClass(table) {
  if (table.category === '包间') return 'cat-named';
  if (table.name && table.name.startsWith('B')) return 'cat-b';
  if (table.name && table.name.startsWith('A')) return 'cat-a';
  return 'cat-named';
}

function renderCard(catClass, catLabel, tName, activeBookings, storeId) {
  if (activeBookings.length === 0) {
    return `<div class="room-card ${catClass}">
      <div class="room-name">${tName}</div>
      <div class="room-category">${catLabel}</div>
      <div class="room-status free"><span class="status-dot"></span>空闲</div>
      <button class="room-action free-action" onclick="openBooking('${tName}','${storeId}')">📝 预订</button>
    </div>`;
  }
  const multiClass = activeBookings.length > 1 ? ' multi-warn' : '';
  const slotHtml = activeBookings.map((b, i) => {
    const mins = timeToMinutes(b.time);
    const isMorning = mins < 840;
    const timeLabel = isMorning ? '🌅 午市' : '🌙 晚市';
    return `<div class="booking-slot" onclick="editBooking('${b.id}')">
      <div class="slot-header">
        <span class="slot-time">${b.time}</span>
        <span class="slot-period">${timeLabel}</span>
      </div>
      <div class="slot-body">
        <strong>${b.name}</strong> · ${b.people}人
        ${b.phone ? '<br>' + b.phone : ''}
      </div>
      <div class="slot-actions">
        <button class="btn-small-cancel" onclick="event.stopPropagation();cancelBooking('${b.id}')">取消</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="room-card ${catClass}${multiClass}">
    <div class="room-name">${tName}</div>
    <div class="room-category">${catLabel}</div>
    <div class="room-status warn"><span class="status-dot"></span>已预订</div>
    <div class="booking-slots-wrap">${slotHtml}</div>
    <button class="room-action free-action" onclick="openBooking('${tName}','${storeId}')" style="margin-top:8px">📝 + 新增</button>
  </div>`;
}

function renderGrid() {
  const grid = document.getElementById('roomGrid');
  const today = state.date;
  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Shanghai' });
  const currentMinutes = new Date().getHours() * 60 + new Date().getMinutes();
  
  if (state.isAdmin && state.allStoresData) {
    // ★ 管理员视图：按门店分组显示
    let html = '';
    for (const store of state.allStoresData) {
      const storeBookings = store.bookings || [];
      const storeTables = store.tables || [];
      if (!storeTables.length) continue;
      html += `<div style="${html ? 'margin-top:32px' : ''}">
        <div class="section-title" style="font-size:16px;color:var(--primary);margin-bottom:10px">🏪 ${store.name}</div>
        <div class="room-grid">`;
      for (const t of storeTables) {
        const catClass = getCatClass(t);
        const allToday = storeBookings.filter(b => (b.tables || []).includes(t.name));
        const active = allToday.filter(b => todayStr !== state.date || timeToMinutes(b.time) + 60 > currentMinutes)
          .sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
        html += renderCard(catClass, t.category||'', t.name, active, store.id);
      }
      html += '</div></div>';
    }
    grid.innerHTML = html;
    return;
  }
  
  // ★ 普通视图
  grid.innerHTML = state.tables.map(t => {
    const catClass = getCatClass(t);
    const allToday = state.bookings
      .filter(b => (b.tables || []).includes(t.name) && b.date === today);
    const activeBookings = allToday
      .filter(b => todayStr !== state.date || timeToMinutes(b.time) + 60 > currentMinutes)
      .sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
    return renderCard(catClass, t.category||'', t.name, activeBookings, state.store);
  }).join('');
}

// ── 渲染预订表格 ──
function renderBookingTable() {
  const tbody = document.getElementById('bookingTbody');
  const noData = document.getElementById('noData');
  let list = state.currentTab === 'today'
    ? state.bookings.filter(b => b.date === state.date)
    : state.bookings;
  
  if (!list.length) {
    tbody.innerHTML = '';
    noData.style.display = 'block';
    tbody.parentElement.style.display = 'none';
    return;
  }
  noData.style.display = 'none';
  tbody.parentElement.style.display = 'table';
  
  tbody.innerHTML = list.map(b => {
    const tablesStr = (b.tables||[]).join('、');
    const mins = timeToMinutes(b.time);
    const now = new Date();
    const curMins = now.getHours() * 60 + now.getMinutes();
    const todayStr2 = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Shanghai' });
    const isPast = b.date === todayStr2 && mins + 60 <= curMins;
    const rowClass = isPast ? ' class="row-past"' : '';
    const storeCell = state.isAdmin ? `<td style="font-size:12px;color:var(--text-light)">${b._storeName||''}</td>` : '';
    return `<tr${rowClass}>
      ${storeCell}<td><strong>${tablesStr}</strong></td>
      <td>${b.date} ${b.time}${isPast ? ' <span style="color:#999;font-size:11px">✅已过</span>' : ''}</td>
      <td>${b.name}</td>
      <td>${b.phone||'—'}</td>
      <td>${b.people}人</td>
      <td>
        <a class="action-link" onclick="editBooking('${b.id}')">编辑</a>
        <a class="action-link" style="margin-left:8px" onclick="cancelBooking('${b.id}')">取消</a>
      </td>
    </tr>`;
  }).join('');
}

function switchTab(tab) {
  state.currentTab = tab;
  document.getElementById('tabToday').classList.toggle('active', tab === 'today');
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  renderBookingTable();
}

// ── 预订弹窗 ──
function openBooking(presetTable, storeId) {
  state.editId = null;
  state.selectedTables = presetTable ? [presetTable] : [];
  state.currentStore = storeId || state.store;
  state._editStoreId = null;
  document.getElementById('modalTitle').textContent = '📝 预订登记';
  document.getElementById('formDate').value = state.date;
  document.getElementById('formTime').value = '18:00';
  document.getElementById('formName').value = '';
  document.getElementById('formPeople').value = '';
  document.getElementById('formPhone').value = '';
  document.getElementById('formNote').value = '';
  document.getElementById('submitBtn').textContent = '确认预订';
  document.getElementById('submitBtn').className = 'btn btn-primary';
  
  buildTableCheckGrid();
  document.getElementById('modalOverlay').classList.add('show');
}

function editBooking(id) {
  const booking = state.bookings.find(b => b.id === id);
  if (!booking) return;
  
  state.editId = id;
  state.selectedTables = [...(booking.tables||[])];
  state.currentStore = booking._storeId || state.store;
  state._editStoreId = state.currentStore;
  document.getElementById('modalTitle').textContent = '✏️ 编辑预订';
  document.getElementById('formDate').value = booking.date;
  document.getElementById('formTime').value = booking.time;
  document.getElementById('formName').value = booking.name;
  document.getElementById('formPeople').value = booking.people;
  document.getElementById('formPhone').value = booking.phone || '';
  document.getElementById('formNote').value = booking.note || '';
  document.getElementById('submitBtn').textContent = '保存修改';
  document.getElementById('submitBtn').className = 'btn btn-primary';
  
  buildTableCheckGrid();
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function toggleTable(name) {
  const idx = state.selectedTables.indexOf(name);
  if (idx >= 0) { state.selectedTables.splice(idx, 1); } 
  else { state.selectedTables.push(name); }
  buildTableCheckGrid();
}

function buildTableCheckGrid() {
  const grid = document.getElementById('tableCheckGrid');
  const count = document.getElementById('tableCount');
  
  const formDate = document.getElementById('formDate').value;
  const formTime = document.getElementById('formTime').value;
  const formMinutes = timeToMinutes(formTime);
  
  // 只禁用同一日期、同一桌台、且时间冲突（前后2小时内）的
  const bookedTables = new Set();
  state.bookings.forEach(b => {
    if (b.id === state.editId) return;
    if (b.date !== formDate) return;
    const bMinutes = timeToMinutes(b.time);
    if (Math.abs(formMinutes - bMinutes) < 120) {
      (b.tables || []).forEach(t => bookedTables.add(t));
    }
  });
  
  const gridTables = state.isAdmin ? state.tables.filter(t => t._storeId === state.currentStore) : state.tables;
  grid.innerHTML = gridTables.map(t => {
    const sel = state.selectedTables.includes(t.name);
    const disabled = bookedTables.has(t.name);
    let cls = 'table-check-item';
    if (sel) cls += ' selected';
    if (disabled) cls += ' disabled';
    return `<div class="${cls}" onclick="${disabled?'':'toggleTable(\''+t.name+'\')'}">
      ${t.name}<span class="cat">${t.category||''}</span>
    </div>`;
  }).join('');
  
  count.textContent = `已选：${state.selectedTables.length} 张桌台`;
}

async function submitBooking() {
  const tables = state.selectedTables;
  const date = document.getElementById('formDate').value;
  const time = document.getElementById('formTime').value;
  const name = document.getElementById('formName').value.trim();
  const people = document.getElementById('formPeople').value.trim();
  const phone = document.getElementById('formPhone').value.trim();
  const note = document.getElementById('formNote').value.trim();
  
  if (!tables.length) { toast('请选择至少一张桌台', 'error'); return; }
  if (!date || !time || !name || !people) { toast('请填写完整信息（桌台/日期/时间/姓名/人数为必填）', 'error'); return; }
  
  const body = { tables, date, time, name, people, phone, note };
  
  try {
    const targetStore = state.currentStore || state.store;
    let r;
    if (state.editId) {
      r = await fetch(`/api/store/${targetStore}/bookings/${state.editId}`, {
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
        body:JSON.stringify(body)
      });
    } else {
      r = await fetch(`/api/store/${targetStore}/bookings`, {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
        body:JSON.stringify(body)
      });
    }
    const d = await r.json();
    if (!r.ok) { toast(d.error || '操作失败', 'error'); return; }
    toast(state.editId ? '✅ 预订已修改' : '✅ 预订成功');
    closeModal();
    loadAll();
  } catch(e) { toast('网络错误: ' + e.message, 'error'); }
}

// ── 取消预订 ──
async function cancelBooking(id) {
  const booking = state.bookings.find(b => b.id === id);
  const tablesStr = (booking?.tables || []).join('、');
  if (!confirm(`确定取消 ${tablesStr} 的预订吗？\n${booking?.name} · ${booking?.date} ${booking?.time}`)) return;
  
  const targetStore = booking?._storeId || state.store;
  try {
    const r = await fetch(`/api/store/${targetStore}/bookings/${id}`, {
      method:'DELETE', headers:{'Authorization':'Bearer '+state.token}
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error || '取消失败', 'error'); return; }
    toast('⛔ 预订已取消');
    loadAll();
  } catch(e) { toast('网络错误: ' + e.message, 'error'); }
}

// ── 管理后台 ──
function toggleAdmin() {
  state.adminVisible = !state.adminVisible;
  document.getElementById('adminPanel').classList.toggle('show', state.adminVisible);
  if (state.adminVisible) {
    showAdminSection('tables');
    loadAdminData();
  }
}

function showAdminSection(section) {
  document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.toggle('active', false));
  document.querySelectorAll('.admin-section').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sec-' + section).classList.add('active');
  if (section === 'tables') renderTableManage();
  if (section === 'accounts') loadUsers();
  if (section === 'store') { loadAdminStoreList(); }
}

function renderTableManage() {
  const list = document.getElementById('tableManageList');
  list.innerHTML = state.tables.map(t => `
    <div class="table-manage-item">
      <div><strong>${t.name}</strong><span class="cat"> · ${t.category||'大厅'}</span></div>
      <button class="delete-table-btn" onclick="deleteTable('${t.name}')">删除</button>
    </div>
  `).join('');
}

async function addTable() {

  const cat = document.getElementById('newTableCat').value;
  if (!name) { toast('请输入桌台名称', 'error'); return; }
  
  try {
    const r = await fetch(`/api/store/${state.store}/tables`, {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
      body:JSON.stringify({name, category:cat})
    });

async function deleteTable(name) {

async function batchImport() {
  const text = document.getElementById('batchInput').value.trim();

  const tables = text.split('\n').filter(l => l.trim()).map(line => {

  try {
    const r = await fetch(`/api/store/${state.store}/tables/batch`, {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},

async function loadUsers() {

async function createUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  const store = document.getElementById('newUserStore').value.trim();
  if (!username || !password || !store) { toast('请填写完整', 'error'); return; }

    await fetch(`/api/admin/users/${username}`, {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
      body:JSON.stringify({password:pw})
    });

async function deleteUser(username) {

async function updateStoreName() {
  const storeId = document.getElementById('adminStoreSelect').value;
  const name = document.getElementById('storeNameInput').value.trim();
  if (!name) { toast('请输入门店名称', 'error'); return; }
  try {
    const r = await fetch(`/api/store/${storeId}/settings`, {
      method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
      body:JSON.stringify({name})
    });
    if (!r.ok) { const d=await r.json(); toast(d.error,'error'); return; }
    state.storeName = name;
    document.getElementById('storeNameDisplay').textContent = name;
    await loadAdminStoreList();
    toast('✅ 门店名称已更新');
  } catch(e) { toast('网络错误', 'error'); }
}

async function onAdminStoreSwitch() {
  const storeId = document.getElementById('adminStoreSelect').value;
  const storeName = document.getElementById('adminStoreSelect').selectedOptions[0].textContent;
  document.getElementById('storeNameInput').value = storeName.split('·')[0].trim();
  try {
    const r = await fetch(`/api/store/${storeId}`, {headers:{'Authorization':'Bearer '+state.token}});
    const d = await r.json();
    document.getElementById('storeWebhookInput').value = d.wecom_webhook || '';
    document.getElementById('storePhoneInput').value = d.phone || '';
    document.getElementById('storeNavInput').value = d.nav_url || '';
    document.getElementById('storeParkingInput').value = d.parking || '';
  } catch {}
  await loadTablesForStore(storeId);
}

async function saveStoreSetting(field, inputId, apiField) {
  const storeId = document.getElementById('adminStoreSelect').value;
  const val = document.getElementById(inputId).value.trim();
  try {
    const r = await fetch(`/api/store/${storeId}/settings`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
      body: JSON.stringify({ [apiField]: val })
    });
    if (r.ok) { toast('已保存', 'success'); }
    else { toast('保存失败', 'error'); }
  } catch { toast('保存失败', 'error'); }
}
function saveStoreWebhook() { saveStoreSetting('wecom_webhook', 'storeWebhookInput', 'wecom_webhook'); }
function saveStorePhone() { saveStoreSetting('phone', 'storePhoneInput', 'phone'); }
function saveStoreNav() { saveStoreSetting('nav_url', 'storeNavInput', 'nav_url'); }
function saveStoreParking() { saveStoreSetting('parking', 'storeParkingInput', 'parking'); }

async function deleteStore() {
  const storeId = document.getElementById('adminStoreSelect').value;
  const storeName = document.getElementById('adminStoreSelect').selectedOptions[0].textContent;
  if (!confirm(`确定删除门店「${storeName}」？所有预订数据将被清空！`)) return;
  if (storeId === 'dalang') { toast('主门店 dalang 不能删除', 'error'); return; }
  try {
    const r = await fetch(`/api/admin/stores/${storeId}`, {
      method:'DELETE', headers:{'Authorization':'Bearer '+state.token}
    });
    if (!r.ok) { const d=await r.json(); toast(d.error,'error'); return; }
    await loadAdminStoreList();
    toast('🗑️ 门店已删除');
  } catch(e) { toast('网络错误', 'error'); }
}

async function loadAdminStoreList() {
  try {
    const r = await fetch('/api/stores');
    const stores = await r.json();
    const sel = document.getElementById('adminStoreSelect');
    const cur = document.getElementById('adminStoreSelect').value || state.store;
    sel.innerHTML = stores.map(s => `<option value="${s.id}">${s.name} · ${s.id}</option>`).join('');
    if (stores.find(s=>s.id===cur)) sel.value = cur;
    else sel.value = stores[0]?.id || 'dalang';
    await onAdminStoreSwitch();
  } catch(e) { toast('加载门店列表失败', 'error'); }
}

function exportHistory() {
  const url = state.isAdmin ? '/api/admin/history/export' : `/api/store/${state.store}/history/export`;
  const fname = state.isAdmin ? `全店历史记录_${new Date().toISOString().slice(0,10)}.csv` : `${state.storeName}_历史记录_${state.date||new Date().toISOString().slice(0,10)}.csv`;
  fetch(url, {
    headers:{'Authorization':'Bearer '+state.token}
  }).then(r => {
    if (!r.ok) { toast('导出失败 ('+r.status+')', 'error'); return; }
    r.blob().then(blob => {
      const url2 = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url2;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url2);
      toast('导出成功', 'success');
    });
  }).catch(e => toast('导出失败: '+e.message, 'error'));
}

async function loadAdminData() {
  // Load history count
  try {
    const r = await fetch(`/api/store/${state.store}/history`, {
      headers:{'Authorization':'Bearer '+state.token}
    });
    state.history = await r.json();
  } catch {}
}

// ── 工具函数 ──
function timeToMinutes(t) {
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h * 60 + (m || 0);
}

// ── 日期/时间变化时自动推断时段 ──
document.addEventListener('DOMContentLoaded', () => {
  // 监听弹窗时间变化，自动切换时段
  setTimeout(() => {
    const formTime = document.getElementById('formTime');
    if (formTime) {
      formTime.addEventListener('change', () => {
        const minutes = timeToMinutes(formTime.value);
        const period = document.getElementById('formPeriod');
        if (period) {
          if (minutes < 840) period.value = 'morning'; // 14:00之前
          else period.value = 'afternoon';
        }
        buildTableCheckGrid();
      });
    }
    const formDate = document.getElementById('formDate');
    if (formDate) {
      formDate.addEventListener('change', () => buildTableCheckGrid());
    }
  }, 500);

  // 实时时钟
  updateClock();
  setInterval(updateClock, 30000);
});

function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  const el = document.getElementById('liveClock');
  if (el) el.textContent = t;
  // 自动更新今天日期
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const dp = document.getElementById('datePicker');
  if (dp && dp.value !== today) {
    dp.value = today;
    state.date = today;
  }
}

// ── Toast ──
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}
